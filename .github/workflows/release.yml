name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, for example v0.4.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate package, app, tag, and README
        run: node scripts/release-info.js validate --tag "$RELEASE_TAG"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Windows
        run: npm run package:win

      - name: Validate Windows artifact names
        run: node scripts/release-info.js validate-artifacts release --platform windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: validate
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: macos-15-intel
            script: package:mac:x64
          - arch: arm64
            os: macos-15
            script: package:mac:arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package macOS
        run: npm run ${{ matrix.script }}

      - name: Validate macOS artifact name
        run: node scripts/release-info.js validate-artifacts release --platform macos-${{ matrix.arch }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/*.zip
          if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/windows

      - name: Download macOS artifacts (best-effort)
        uses: actions/download-artifact@v4
        with:
          path: artifacts/macos-intel
          name: macos-x64
        continue-on-error: true

      - name: Download macOS arm64 artifacts (best-effort)
        uses: actions/download-artifact@v4
        with:
          path: artifacts/macos-arm64
          name: macos-arm64
        continue-on-error: true

      - name: Reorganize artifacts
        run: |
          # Flatten so release-info.js checksums sees one directory.
          mkdir -p artifacts
          if [ -d artifacts/windows ]; then
            find artifacts/windows -type f -name '*.exe' -exec cp {} artifacts/ \;
          fi
          if [ -d artifacts/macos-intel ]; then
            find artifacts/macos-intel -type f -name '*.zip' -exec cp {} artifacts/ \;
          fi
          if [ -d artifacts/macos-arm64 ]; then
            find artifacts/macos-arm64 -type f -name '*.zip' -exec cp {} artifacts/ \;
          fi
          ls -la artifacts/

      - name: Generate checksums and release notes
        run: |
          node scripts/release-info.js checksums artifacts SHA256SUMS.txt
          node scripts/release-info.js release-notes --tag "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Lan Control Hub ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            artifacts/*.exe
            artifacts/*.zip
            SHA256SUMS.txt